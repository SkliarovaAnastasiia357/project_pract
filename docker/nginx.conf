server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml;
    gzip_min_length 1024;

    # Proxy auth/api to the backend container
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Health endpoints — direct passthrough to API (for Docker healthchecks / external probes)
    location = /healthz {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
    }
    location = /readyz {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
    }

    # Static assets with long cache (vite hashes filenames)
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any other route → index.html so React Router handles it
    location / {
        try_files $uri $uri/ /index.html;
    }
}
